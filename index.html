<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Caveat:wght@400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--sand:#F5F0E8;--ocean:#1B6B93;--deep:#0A3D62;--coral:#E8846B;
--foam:#E8F4F8;--sun:#F4A261;--palm:#2A7F62;--shell:#FDF2E9;
--night:#0C1B2A;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--sand);color:var(--night);overflow-x:hidden}

.hero{
min-height:100vh;display:flex;flex-direction:column;
align-items:center;justify-content:center;text-align:center;
background:linear-gradient(180deg,#87CEEB 0%,#4DB8D5 30%,var(--ocean) 60%,#1a5276 100%);
position:relative;overflow:hidden;padding:2rem;
}
.hero::before{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:var(--sand);border-radius:50% 50% 0 0 / 100% 100% 0 0}
.hero-sub{font-family:'Caveat',cursive;font-size:1.3rem;color:rgba(255,255,255,.8);margin-bottom:.5rem;letter-spacing:2px;animation:fadeDown .8s ease both}
.hero h1{font-family:'Caveat',cursive;font-size:clamp(3rem,8vw,5.5rem);color:#fff;font-weight:600;line-height:1.2;margin-bottom:1rem;animation:fadeDown 1s ease both;animation-delay:.2s;text-shadow:0 2px 20px rgba(0,0,0,.15)}
.hero-date{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:rgba(255,255,255,.7);letter-spacing:3px;animation:fadeDown 1s ease both;animation-delay:.5s;background:rgba(255,255,255,.1);padding:8px 20px;border-radius:30px;backdrop-filter:blur(10px)}
.hero-scroll{position:absolute;bottom:140px;animation:fadeDown 1s ease both, bob 2s ease-in-out infinite;animation-delay:.8s;color:rgba(255,255,255,.6);font-size:.8rem;letter-spacing:2px}
.hero-scroll::after{content:'↓';display:block;text-align:center;margin-top:4px;font-size:1.2rem}

.terminal{max-width:560px;margin:-40px auto 3rem;position:relative;z-index:2;background:var(--night);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.terminal-bar{height:36px;background:#1a2332;display:flex;align-items:center;padding:0 14px;gap:8px}
.terminal-dot{width:12px;height:12px;border-radius:50%}
.terminal-dot:nth-child(1){background:#FF6058}
.terminal-dot:nth-child(2){background:#FFBE2E}
.terminal-dot:nth-child(3){background:#27CA40}
.terminal-body{padding:20px 24px;font-family:'JetBrains Mono',monospace;font-size:.78rem;line-height:2;color:#a8d8b9}
.comment{color:#546e7a}.keyword{color:#82AAFF}.string{color:#C3E88D}.func{color:#F4A261}.var{color:#E8846B}

.content{max-width:720px;margin:0 auto;padding:0 1.5rem 4rem}

.day{margin-bottom:4rem}
.day-header{display:flex;align-items:center;gap:16px;margin-bottom:2rem}
.day-num{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Caveat',cursive;font-size:1.8rem;font-weight:600;color:#fff}
.day-colors-0{background:linear-gradient(135deg,var(--coral),var(--sun))}
.day-colors-1{background:linear-gradient(135deg,var(--ocean),#2E86AB)}
.day-colors-2{background:linear-gradient(135deg,var(--palm),#45B08C)}
.day-colors-3{background:linear-gradient(135deg,#8E7CC3,#C27BA0)}
.day-title{font-size:1.4rem;font-weight:700;line-height:1.3}
.day-subtitle{font-size:.85rem;color:#888;margin-top:2px;font-weight:300}

.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--ocean) 0%,var(--coral) 100%);border-radius:2px;opacity:.2}
.tl-item{display:flex;gap:16px;margin-bottom:16px;position:relative;padding:12px 16px;border-radius:12px;transition:all .2s}
.tl-item:hover{background:rgba(27,107,147,.04)}
.tl-item::before{content:'';position:absolute;left:-24px;top:18px;width:10px;height:10px;border-radius:50%;border:2px solid var(--ocean);background:var(--sand)}
.tl-item.highlight::before{background:var(--coral);border-color:var(--coral)}
.tl-time{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--ocean);min-width:48px;padding-top:2px;font-weight:400}
.tl-place{font-weight:500;font-size:.95rem;margin-bottom:3px}
.tl-note{font-size:.8rem;color:#777;line-height:1.6;font-weight:300}
.tl-tag{display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:20px;margin-top:4px;font-weight:500}
.tag-food{background:#FFF3E0;color:#E65100}
.tag-view{background:#E0F2F1;color:#00695C}
.tag-shop{background:#F3E5F5;color:#7B1FA2}
.tag-beach{background:#E0F7FA;color:#00838F}
.parking{background:var(--foam);border-radius:10px;padding:10px 14px;margin-top:6px;font-size:.75rem;color:#555;border-left:3px solid var(--ocean)}
.parking::before{content:'P ';font-weight:700;color:var(--ocean)}
.divider{text-align:center;margin:3rem 0;color:#ccc;font-size:1.5rem;letter-spacing:12px}

.footer{text-align:center;padding:4rem 2rem;background:linear-gradient(0deg,var(--deep) 0%,var(--night) 100%);color:rgba(255,255,255,.5)}
.footer-heart{font-size:2.5rem;margin-bottom:1rem;animation:pulse 1.5s ease-in-out infinite}
.footer-msg{font-family:'Caveat',cursive;font-size:1.5rem;color:rgba(255,255,255,.8);margin-bottom:.5rem}
.footer-sub{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.3)}

/* EDIT MODE */
.fab{
position:fixed;bottom:24px;right:24px;z-index:100;
width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;
background:var(--ocean);color:#fff;font-size:1.3rem;
box-shadow:0 4px 20px rgba(27,107,147,.4);transition:all .2s;
display:flex;align-items:center;justify-content:center;
}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(27,107,147,.5)}
.fab.active{background:var(--coral)}
.fab-share{
position:fixed;bottom:24px;right:90px;z-index:100;
width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
background:var(--palm);color:#fff;font-size:1.1rem;
box-shadow:0 4px 16px rgba(42,127,98,.4);transition:all .3s;
display:none;align-items:center;justify-content:center;
}
.fab-share.show{display:flex}
.fab-share:hover{transform:scale(1.08)}

.editing .tl-item{border:1.5px dashed transparent;position:relative}
.editing .tl-item:hover{border-color:var(--ocean);background:rgba(27,107,147,.03)}
.editing .editable{cursor:text;border-bottom:1px dashed rgba(27,107,147,.3);padding-bottom:1px;outline:none;min-width:30px;display:inline-block}
.editing .editable:focus{border-bottom-color:var(--coral);background:rgba(232,132,107,.05)}

.btn-add{
display:none;width:100%;padding:10px;margin-top:8px;
border:2px dashed #ccc;border-radius:10px;background:transparent;
color:#aaa;font-size:.8rem;cursor:pointer;transition:all .2s;
font-family:'Noto Sans KR',sans-serif;
}
.btn-add:hover{border-color:var(--ocean);color:var(--ocean);background:rgba(27,107,147,.03)}
.editing .btn-add{display:block}

.btn-del{
display:none;position:absolute;top:8px;right:8px;
width:24px;height:24px;border-radius:50%;border:none;
background:rgba(220,53,69,.1);color:#dc3545;font-size:.8rem;
cursor:pointer;transition:all .2s;
align-items:center;justify-content:center;
}
.btn-del:hover{background:rgba(220,53,69,.2)}
.editing .btn-del{display:flex}

.toast{
position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
background:var(--night);color:#fff;padding:12px 24px;border-radius:10px;
font-size:.85rem;opacity:0;transition:all .3s;z-index:200;
pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.edit-day-header .editable{cursor:text;border-bottom:1px dashed rgba(27,107,147,.3);padding-bottom:1px}

@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

@media(max-width:600px){
.tl-item{padding:8px 12px}
.day-header{gap:12px}
.day-num{width:52px;height:52px;font-size:1.5rem}
.terminal-body{font-size:.7rem;padding:16px}
.fab{bottom:16px;right:16px;width:50px;height:50px;font-size:1.1rem}
.fab-share{bottom:16px;right:76px;width:42px;height:42px;font-size:1rem}
}
</style>
</head>

let editMode = false;

function loadData() {
  const urlData = getUrlData();
  if (urlData) { data = urlData; saveLocal(); }
  else {
    const local = localStorage.getItem('okinawa_trip');
    data = local ? JSON.parse(local) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveLocal() { localStorage.setItem('okinawa_trip', JSON.stringify(data)); }

function getUrlData() {
  try {
    const hash = location.hash.slice(1);
    if (!hash) return null;
    const json = decodeURIComponent(atob(hash));
    const parsed = JSON.parse(json);
    if (Array.isArray(parsed) && parsed.length > 0) {
      history.replaceState(null, '', location.pathname);
      return parsed;
    }
  } catch(e) {}
  return null;
}

function makeUrl() {
  const b = btoa(encodeURIComponent(JSON.stringify(data)));
  return location.origin + location.pathname + '#' + b;
}

const tagMap = {food:['tag-food','맛집'],view:['tag-view','뷰포인트'],shop:['tag-shop','쇼핑'],beach:['tag-beach','해변']};

function render() {
  const ct = document.getElementById('itinerary');
  ct.innerHTML = '';
  data.forEach((day, di) => {
    const sec = document.createElement('div');
    sec.className = 'day';
    sec.innerHTML = `
      <div class="day-header">
        <div class="day-num day-colors-${di}">D${di+1}</div>
        <div>
          <div class="day-title ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="title" data-di="${di}">${esc(day.title)}</div>
          <div class="day-subtitle ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="subtitle" data-di="${di}">${esc(day.subtitle)}</div>
        </div>
      </div>
      <div class="timeline" id="timeline-${di}"></div>
      <button class="btn-add" onclick="addItem(${di})">+ 일정 추가</button>
    `;
    if (di > 0) { const dv = document.createElement('div'); dv.className='divider'; dv.textContent='~ ~ ~'; ct.appendChild(dv); }
    ct.appendChild(sec);

    const tl = sec.querySelector('.timeline');
    day.items.forEach((item, ii) => {
      const el = document.createElement('div');
      el.className = `tl-item${item.hl?' highlight':''}`;
      let tagHtml = '';
      if (item.tag && tagMap[item.tag]) tagHtml = `<span class="tl-tag ${tagMap[item.tag][0]}">${tagMap[item.tag][1]}</span>`;
      let parkHtml = '';
      if (item.parking) parkHtml = `<div class="parking"><span class="${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="parking" data-di="${di}" data-ii="${ii}">${esc(item.parking)}</span></div>`;

      el.innerHTML = `
        <button class="btn-del" onclick="delItem(${di},${ii})" title="삭제">✕</button>
        <span class="tl-time ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="time" data-di="${di}" data-ii="${ii}">${esc(item.time)}</span>
        <div class="tl-content">
          <div class="tl-place ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="place" data-di="${di}" data-ii="${ii}">${esc(item.place)}</div>
          <div class="tl-note ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="note" data-di="${di}" data-ii="${ii}">${esc(item.note)}</div>
          ${tagHtml}${parkHtml}
        </div>
      `;
      tl.appendChild(el);
    });
  });

  if (!editMode) initScrollAnim();
  document.querySelectorAll('.editable').forEach(el => {
    el.addEventListener('blur', onEdit);
    el.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();el.blur()} });
  });
}

function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function onEdit(e) {
  const el = e.target;
  const di = parseInt(el.dataset.di);
  const ii = el.dataset.ii !== undefined ? parseInt(el.dataset.ii) : null;
  const field = el.dataset.field;
  const val = el.textContent.trim();

  if (ii !== null) { data[di].items[ii][field] = val; }
  else { data[di][field] = val; }
  saveLocal();
}

function addItem(di) {
  data[di].items.push({time:"00:00",place:"새 일정",note:"메모를 입력하세요",tag:"",parking:"",hl:false});
  saveLocal(); render();
}

function delItem(di, ii) {
  if (data[di].items.length <= 1) { showToast('최소 1개 항목은 있어야 해요'); return; }
  data[di].items.splice(ii, 1);
  saveLocal(); render();
}

function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('editing', editMode);
  document.getElementById('fabEdit').classList.toggle('active', editMode);
  document.getElementById('fabEdit').textContent = editMode ? '✓' : '✏️';
  document.getElementById('fabShare').classList.toggle('show', editMode);
  render();
  showToast(editMode ? '편집 모드 ON — 클릭해서 수정!' : '편집 모드 OFF — 저장 완료!');
}

function shareItinerary() {
  const url = makeUrl();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('링크 복사 완료! 카톡으로 보내세요 💌'));
  } else {
    const ta = document.createElement('textarea'); ta.value = url;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('링크 복사 완료! 카톡으로 보내세요 💌');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function initScrollAnim() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)'} });
  },{threshold:.1});
  document.querySelectorAll('.day').forEach(d => {
    d.style.opacity='0';d.style.transform='translateY(30px)';d.style.transition='all .6s ease';obs.observe(d);
  });
  document.querySelectorAll('.tl-item').forEach((item,i) => {
    item.style.opacity='0';item.style.transform='translateX(-10px)';
    item.style.transition=`all .4s ease ${i*.03}s`;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateX(0)'}});
    },{threshold:.1});
    io.observe(item);
  });
}

loadData();
render();
</script>
</body>
</html>
