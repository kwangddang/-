<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리의 오키나와 🌊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Caveat:wght@400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--sand:#F5F0E8;--ocean:#1B6B93;--deep:#0A3D62;--coral:#E8846B;
--foam:#E8F4F8;--sun:#F4A261;--palm:#2A7F62;--shell:#FDF2E9;
--night:#0C1B2A;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--sand);color:var(--night);overflow-x:hidden}

.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:linear-gradient(180deg,#87CEEB 0%,#4DB8D5 30%,var(--ocean) 60%,#1a5276 100%);position:relative;overflow:hidden;padding:2rem}
.hero::before{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:var(--sand);border-radius:50% 50% 0 0 / 100% 100% 0 0}
.hero-sub{font-family:'Caveat',cursive;font-size:1.3rem;color:rgba(255,255,255,.8);margin-bottom:.5rem;letter-spacing:2px;animation:fadeDown .8s ease both}
.hero h1{font-family:'Caveat',cursive;font-size:clamp(3rem,8vw,5.5rem);color:#fff;font-weight:600;line-height:1.2;margin-bottom:1.5rem;animation:fadeDown 1s ease both;animation-delay:.2s;text-shadow:0 2px 20px rgba(0,0,0,.15)}
.dday{font-family:'Caveat',cursive;font-size:3rem;color:#fff;font-weight:600;margin-bottom:.5rem;cursor:pointer;animation:fadeDown 1s ease both;animation-delay:.4s;text-shadow:0 2px 20px rgba(0,0,0,.2)}
.dday:hover{opacity:.85}
.dday-label{font-size:.7rem;color:rgba(255,255,255,.65);letter-spacing:2px;margin-top:-4px;font-family:'JetBrains Mono',monospace}
.hero-date{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:rgba(255,255,255,.7);letter-spacing:3px;animation:fadeDown 1s ease both;animation-delay:.5s;background:rgba(255,255,255,.1);padding:7px 18px;border-radius:30px;backdrop-filter:blur(10px);margin-top:1rem}
.hero-scroll{position:absolute;bottom:140px;animation:fadeDown 1s ease both, bob 2s ease-in-out infinite;animation-delay:.8s;color:rgba(255,255,255,.6);font-size:.8rem;letter-spacing:2px}
.hero-scroll::after{content:'↓';display:block;text-align:center;margin-top:4px;font-size:1.2rem}

.terminal{max-width:560px;margin:-40px auto 3rem;position:relative;z-index:2;background:var(--night);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.terminal-bar{height:36px;background:#1a2332;display:flex;align-items:center;padding:0 14px;gap:8px}
.terminal-dot{width:12px;height:12px;border-radius:50%}
.terminal-dot:nth-child(1){background:#FF6058}
.terminal-dot:nth-child(2){background:#FFBE2E}
.terminal-dot:nth-child(3){background:#27CA40}
.terminal-body{padding:20px 24px;font-family:'JetBrains Mono',monospace;font-size:.78rem;line-height:2;color:#a8d8b9}
.comment{color:#546e7a}.keyword{color:#82AAFF}.string{color:#C3E88D}.func{color:#F4A261}.var{color:#E8846B}

.content{max-width:720px;margin:0 auto;padding:0 1.5rem 4rem}
.day{margin-bottom:4rem}
.day-header{display:flex;align-items:center;gap:16px;margin-bottom:2rem}
.day-num{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Caveat',cursive;font-size:1.8rem;font-weight:600;color:#fff}
.day-colors-0{background:linear-gradient(135deg,var(--coral),var(--sun))}
.day-colors-1{background:linear-gradient(135deg,var(--ocean),#2E86AB)}
.day-colors-2{background:linear-gradient(135deg,var(--palm),#45B08C)}
.day-colors-3{background:linear-gradient(135deg,#8E7CC3,#C27BA0)}
.day-title{font-size:1.4rem;font-weight:700;line-height:1.3}
.day-subtitle{font-size:.85rem;color:#888;margin-top:2px;font-weight:300}

.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--ocean) 0%,var(--coral) 100%);border-radius:2px;opacity:.2}
.tl-item{display:flex;gap:16px;margin-bottom:16px;position:relative;padding:12px 16px;border-radius:12px;transition:all .2s}
.tl-item:hover{background:rgba(27,107,147,.04)}
.tl-item::before{content:'';position:absolute;left:-24px;top:18px;width:10px;height:10px;border-radius:50%;border:2px solid var(--ocean);background:var(--sand)}
.tl-item.highlight::before{background:var(--coral);border-color:var(--coral)}
.tl-time{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--ocean);min-width:48px;padding-top:2px;font-weight:400}
.tl-place{font-weight:500;font-size:.95rem;margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-note{font-size:.8rem;color:#777;line-height:1.6;font-weight:300}
.tl-tag{display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:20px;margin-top:4px;font-weight:500}
.tag-food{background:#FFF3E0;color:#E65100}
.tag-view{background:#E0F2F1;color:#00695C}
.tag-shop{background:#F3E5F5;color:#7B1FA2}
.tag-beach{background:#E0F7FA;color:#00838F}
.parking{background:var(--foam);border-radius:10px;padding:10px 14px;margin-top:6px;font-size:.75rem;color:#555;border-left:3px solid var(--ocean)}
.parking::before{content:'P ';font-weight:700;color:var(--ocean)}

.btn-copy{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;padding:3px 10px;border-radius:20px;background:rgba(27,107,147,.08);color:var(--ocean);border:1px solid rgba(27,107,147,.2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .2s;text-decoration:none}
.btn-copy:hover{background:var(--ocean);color:#fff;border-color:var(--ocean)}
.btn-copy::before{content:'📍';font-size:.7rem}
.btn-park{background:rgba(244,162,97,.12);color:#C66B1F;border-color:rgba(244,162,97,.3);margin-left:6px;vertical-align:middle}
.btn-park:hover{background:#C66B1F;color:#fff;border-color:#C66B1F}
.btn-park::before{content:'🅿️';font-size:.7rem}

.btn-nearby{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;padding:5px 12px;border-radius:20px;background:rgba(232,132,107,.1);color:var(--coral);border:1px solid rgba(232,132,107,.25);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .2s;margin-top:8px}
.btn-nearby:hover{background:var(--coral);color:#fff;border-color:var(--coral)}
.btn-nearby::before{content:'🍴';font-size:.75rem}
.btn-nearby.open{background:var(--coral);color:#fff;border-color:var(--coral)}
.btn-nearby.open::before{content:'▾'}

.nearby-panel{margin-top:10px;background:#fff;border-radius:12px;padding:14px 16px;border:1px solid rgba(0,0,0,.05);max-height:0;overflow:hidden;opacity:0;transition:all .3s ease;padding-top:0;padding-bottom:0;border-width:0}
.nearby-panel.open{max-height:2000px;opacity:1;padding-top:14px;padding-bottom:14px;border-width:1px;margin-top:10px}
.nearby-section{margin-bottom:14px}
.nearby-section:last-child{margin-bottom:0}
.nearby-label{font-size:.7rem;font-weight:700;color:var(--ocean);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(27,107,147,.1)}
.nearby-label.shop{color:#7B1FA2;border-bottom-color:rgba(123,31,162,.1)}
.nearby-item{padding:8px 0;border-bottom:1px dashed rgba(0,0,0,.05)}
.nearby-item:last-child{border:none}
.nearby-name{font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px}
.nearby-note{font-size:.72rem;color:#888;line-height:1.5}
.nearby-name .btn-copy{font-size:.6rem;padding:2px 8px}

.divider{text-align:center;margin:3rem 0;color:#ccc;font-size:1.5rem;letter-spacing:12px}

.footer{text-align:center;padding:4rem 2rem;background:linear-gradient(0deg,var(--deep) 0%,var(--night) 100%);color:rgba(255,255,255,.5)}
.footer-heart{font-size:2.5rem;margin-bottom:1rem;animation:pulse 1.5s ease-in-out infinite}
.footer-msg{font-family:'Caveat',cursive;font-size:1.5rem;color:rgba(255,255,255,.8);margin-bottom:.5rem}
.footer-sub{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.3)}

/* FAB stack */
.fab-stack{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:12px}
.fab{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;color:#fff;font-size:1.2rem;box-shadow:0 4px 18px rgba(0,0,0,.2);transition:all .2s;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans KR',sans-serif;font-weight:500}
.fab:hover{transform:scale(1.08)}
.fab-edit{background:var(--ocean)}
.fab-edit.active{background:var(--coral)}
.fab-share{background:var(--palm);display:none}
.fab-share.show{display:flex}
.fab-jp{background:#D4537E}
.fab-pack{background:#8E7CC3}

.editing .tl-item{border:1.5px dashed transparent;position:relative}
.editing .tl-item:hover{border-color:var(--ocean);background:rgba(27,107,147,.03)}
.editing .editable{cursor:text;border-bottom:1px dashed rgba(27,107,147,.3);padding-bottom:1px;outline:none;min-width:30px;display:inline-block}
.editing .editable:focus{border-bottom-color:var(--coral);background:rgba(232,132,107,.05)}

.btn-add{display:none;width:100%;padding:10px;margin-top:8px;border:2px dashed #ccc;border-radius:10px;background:transparent;color:#aaa;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif}
.btn-add:hover{border-color:var(--ocean);color:var(--ocean);background:rgba(27,107,147,.03)}
.editing .btn-add{display:block}

.btn-del{display:none;position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;border:none;background:rgba(220,53,69,.1);color:#dc3545;font-size:.8rem;cursor:pointer;transition:all .2s;align-items:center;justify-content:center}
.btn-del:hover{background:rgba(220,53,69,.2)}
.editing .btn-del{display:flex}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--night);color:#fff;padding:12px 24px;border-radius:10px;font-size:.85rem;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(12,27,42,.5);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:0;animation:fadeIn .25s ease}
.modal-overlay.show{display:flex}
.modal{background:var(--sand);width:100%;max-width:560px;max-height:85vh;border-radius:20px 20px 0 0;overflow-y:auto;animation:slideUp .3s ease;position:relative}
@media(min-width:600px){.modal-overlay{align-items:center;padding:1rem}.modal{border-radius:20px;max-height:80vh}}
.modal-head{position:sticky;top:0;background:var(--sand);padding:1.2rem 1.5rem 1rem;border-bottom:1px solid rgba(0,0,0,.06);z-index:2;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:1.1rem;font-weight:700}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#888;padding:0;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(0,0,0,.05)}
.modal-body{padding:1rem 1.5rem 2rem}

.phrase{padding:14px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.phrase:last-child{border:none}
.phrase-ko{font-size:.85rem;color:#888;margin-bottom:4px}
.phrase-jp{font-size:1.05rem;font-weight:500;margin-bottom:3px}
.phrase-romaji{font-size:.78rem;color:var(--ocean);font-family:'JetBrains Mono',monospace}

.pack-cat{font-size:.75rem;font-weight:700;color:var(--ocean);text-transform:uppercase;letter-spacing:1px;margin:1.2rem 0 .5rem}
.pack-cat:first-child{margin-top:0}
.pack-item{display:flex;align-items:center;gap:12px;padding:10px 4px;cursor:pointer;border-radius:8px;transition:background .15s}
.pack-item:hover{background:rgba(27,107,147,.04)}
.pack-check{width:22px;height:22px;border-radius:6px;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pack-item.done .pack-check{background:var(--palm);border-color:var(--palm)}
.pack-item.done .pack-check::after{content:'✓';color:#fff;font-size:.85rem;font-weight:700}
.pack-label{font-size:.92rem;flex:1}
.pack-item.done .pack-label{color:#aaa;text-decoration:line-through}
.pack-progress{background:var(--foam);padding:12px 16px;border-radius:10px;margin-bottom:1rem;font-size:.85rem;color:var(--ocean);text-align:center;font-weight:500}

.date-input{background:rgba(255,255,255,.95);border:none;border-radius:10px;padding:10px 16px;font-size:.95rem;font-family:'Noto Sans KR',sans-serif;color:var(--night);outline:none;display:block;margin:0 auto}

@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:600px){
.tl-item{padding:8px 12px}
.day-header{gap:12px}
.day-num{width:52px;height:52px;font-size:1.5rem}
.terminal-body{font-size:.7rem;padding:16px}
.fab-stack{bottom:16px;right:16px;gap:10px}
.fab{width:46px;height:46px;font-size:1rem}
.dday{font-size:2.4rem}
}
</style>
</head>

let data = [];
let editMode = false;

function loadData() {
  const urlData = getUrlData();
  if (urlData) { data = urlData; saveLocal(); }
  else {
    const local = localStorage.getItem('okinawa_trip');
    data = local ? JSON.parse(local) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveLocal() { localStorage.setItem('okinawa_trip', JSON.stringify(data)); }

function getUrlData() {
  try {
    const hash = location.hash.slice(1);
    if (!hash) return null;
    const json = decodeURIComponent(atob(hash));
    const parsed = JSON.parse(json);
    if (Array.isArray(parsed) && parsed.length > 0) {
      history.replaceState(null, '', location.pathname);
      return parsed;
    }
  } catch(e) {}
  return null;
}

function makeUrl() {
  const b = btoa(encodeURIComponent(JSON.stringify(data)));
  return location.origin + location.pathname + '#' + b;
}

const tagMap = {food:['tag-food','맛집'],view:['tag-view','뷰포인트'],shop:['tag-shop','쇼핑'],beach:['tag-beach','해변']};

function render() {
  const ct = document.getElementById('itinerary');
  ct.innerHTML = '';
  data.forEach((day, di) => {
    const sec = document.createElement('div');
    sec.className = 'day';
    sec.innerHTML = `
      <div class="day-header">
        <div class="day-num day-colors-${di}">D${di+1}</div>
        <div>
          <div class="day-title ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="title" data-di="${di}">${esc(day.title)}</div>
          <div class="day-subtitle ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="subtitle" data-di="${di}">${esc(day.subtitle)}</div>
        </div>
      </div>
      <div class="timeline" id="timeline-${di}"></div>
      <button class="btn-add" onclick="addItem(${di})">+ 일정 추가</button>
    `;
    if (di > 0) { const dv = document.createElement('div'); dv.className='divider'; dv.textContent='~ ~ ~'; ct.appendChild(dv); }
    ct.appendChild(sec);

    const tl = sec.querySelector('.timeline');
    day.items.forEach((item, ii) => {
      const el = document.createElement('div');
      el.className = `tl-item${item.hl?' highlight':''}`;
      let tagHtml = '';
      if (item.tag && tagMap[item.tag]) tagHtml = `<span class="tl-tag ${tagMap[item.tag][0]}">${tagMap[item.tag][1]}</span>`;
      let parkHtml = '';
      if (item.parking) {
        let parkBtn = '';
        if (item.parkAddr) {
          const purl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.parkAddr)}`;
          parkBtn = ` <a class="btn-copy btn-park" href="${purl}" target="_blank" rel="noopener" onclick="copyAlso('${esc(item.parkAddr).replace(/'/g,"\\'")}')">P 위치</a>`;
        }
        parkHtml = `<div class="parking"><span class="${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="parking" data-di="${di}" data-ii="${ii}">${esc(item.parking)}</span>${parkBtn}</div>`;
      }
      let mapBtn = '';
      if (item.addr) {
        const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.addr)}`;
        mapBtn = `<a class="btn-copy" href="${url}" target="_blank" rel="noopener" onclick="copyAlso('${esc(item.addr).replace(/'/g,"\\'")}')">지도 열기</a>`;
      }

      let nearbyHtml = '';
      if (item.nearby && NEARBY[item.nearby]) {
        const nb = NEARBY[item.nearby];
        const panelId = `nb-${di}-${ii}`;
        let panelInner = '';
        if (nb.food && nb.food.length) {
          panelInner += `<div class="nearby-section"><div class="nearby-label">🍴 근처 맛집</div>`;
          nb.food.forEach(f => {
            const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(f.addr)}`;
            panelInner += `<div class="nearby-item"><div class="nearby-name">${esc(f.name)}<a class="btn-copy" href="${url}" target="_blank" rel="noopener" onclick="copyAlso('${esc(f.addr).replace(/'/g,"\\'")}')">지도</a></div><div class="nearby-note">${esc(f.note)}</div></div>`;
          });
          panelInner += `</div>`;
        }
        if (nb.shop && nb.shop.length) {
          panelInner += `<div class="nearby-section"><div class="nearby-label shop">🛍️ 볼만한 가게</div>`;
          nb.shop.forEach(s => {
            const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.addr)}`;
            panelInner += `<div class="nearby-item"><div class="nearby-name">${esc(s.name)}<a class="btn-copy" href="${url}" target="_blank" rel="noopener" onclick="copyAlso('${esc(s.addr).replace(/'/g,"\\'")}')">지도</a></div><div class="nearby-note">${esc(s.note)}</div></div>`;
          });
          panelInner += `</div>`;
        }
        nearbyHtml = `<button class="btn-nearby" onclick="toggleNearby('${panelId}', this)">근처 맛집·매장 보기</button><div class="nearby-panel" id="${panelId}">${panelInner}</div>`;
      }

      el.innerHTML = `
        <button class="btn-del" onclick="delItem(${di},${ii})" title="삭제">✕</button>
        <span class="tl-time ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="time" data-di="${di}" data-ii="${ii}">${esc(item.time)}</span>
        <div class="tl-content">
          <div class="tl-place"><span class="${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="place" data-di="${di}" data-ii="${ii}">${esc(item.place)}</span>${mapBtn}</div>
          <div class="tl-note ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="note" data-di="${di}" data-ii="${ii}">${esc(item.note)}</div>

      `;

  if (!editMode) initScrollAnim();
  document.querySelectorAll('.editable').forEach(el => {
    el.addEventListener('blur', onEdit);
    el.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();el.blur()} });
  });
}

function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function copyAlso(addr) {
  if (navigator.clipboard) navigator.clipboard.writeText(addr).catch(()=>{});
}

function toggleNearby(panelId, btn) {
  const panel = document.getElementById(panelId);
  if (!panel) return;
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.textContent = isOpen ? '접기' : '근처 맛집·매장 보기';
}

function onEdit(e) {
  const el = e.target;
  const di = parseInt(el.dataset.di);
  const ii = el.dataset.ii !== undefined ? parseInt(el.dataset.ii) : null;
  const field = el.dataset.field;
  const val = el.textContent.trim();
  if (ii !== null) { data[di].items[ii][field] = val; }
  else { data[di][field] = val; }
  saveLocal();
}

function addItem(di) {
  data[di].items.push({time:"00:00",place:"새 일정",note:"메모를 입력하세요",tag:"",parking:"",hl:false,addr:""});
  saveLocal(); render();
}

function delItem(di, ii) {
  if (data[di].items.length <= 1) { showToast('최소 1개 항목은 있어야 해요'); return; }
  data[di].items.splice(ii, 1);
  saveLocal(); render();
}

function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('editing', editMode);
  document.getElementById('fabEdit').classList.toggle('active', editMode);
  document.getElementById('fabEdit').textContent = editMode ? '✓' : '✏️';
  document.getElementById('fabShare').classList.toggle('show', editMode);
  render();
  showToast(editMode ? '편집 모드 ON — 클릭해서 수정!' : '편집 모드 OFF — 저장 완료!');
}

function shareItinerary() {
  const url = makeUrl();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('링크 복사 완료! 카톡으로 보내세요 💌'));
  } else {
    const ta = document.createElement('textarea'); ta.value = url;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('링크 복사 완료! 카톡으로 보내세요 💌');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* D-DAY */
function renderDday() {
  let date = localStorage.getItem('okinawa_date');
  if (!date) {
    date = '2026-04-10';
    localStorage.setItem('okinawa_date', date);
  }
  const ddayEl = document.getElementById('dday');
  const labelEl = document.getElementById('ddayLabel');
  const target = new Date(date + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.floor((target - today) / (1000*60*60*24));
  if (diff > 0) {
    ddayEl.textContent = `D-${diff}`;
    labelEl.textContent = `${date} 출발까지`;
  } else if (diff === 0) {
    ddayEl.textContent = 'D-DAY';
    labelEl.textContent = '오늘 출발! ✈️';
  } else if (diff >= -3) {
    ddayEl.textContent = `여행 ${-diff+1}일차`;
    labelEl.textContent = '오키나와에서! 🌊';
  } else {
    ddayEl.textContent = `다녀온 지 ${-diff-3}일`;
    labelEl.textContent = '추억이 되었네 🐚';
  }
}

function setTripDate() {
  const current = localStorage.getItem('okinawa_date') || '';
  const input = prompt('출발일을 입력하세요 (YYYY-MM-DD)', current || '2026-04-10');
  if (input && /^\d{4}-\d{2}-\d{2}$/.test(input)) {
    localStorage.setItem('okinawa_date', input);
    renderDday();
    showToast('출발일 저장 완료!');
  }
}

/* MODAL */
function openModal(type) {
  const overlay = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');

  if (type === 'jp') {
    title.textContent = '🇯🇵 일본어 회화 시트';
    body.innerHTML = PHRASES.map(p => `
      <div class="phrase">
        <div class="phrase-ko">${esc(p.ko)}</div>
        <div class="phrase-jp">${esc(p.jp)}</div>
        <div class="phrase-romaji">${esc(p.ro)}</div>
      </div>
    `).join('');
  } else if (type === 'pack') {
    title.textContent = '✓ 출국 준비물';
    const checked = JSON.parse(localStorage.getItem('okinawa_pack') || '{}');
    let total = 0, done = 0;
    let html = '<div class="pack-progress" id="packProg"></div>';
    Object.entries(PACKING).forEach(([cat, items]) => {
      html += `<div class="pack-cat">${esc(cat)}</div>`;
      items.forEach(item => {
        total++;
        const isDone = checked[item];
        if (isDone) done++;
        html += `<div class="pack-item ${isDone?'done':''}" onclick="togglePack('${esc(item).replace(/'/g,"\\'")}')">
          <div class="pack-check"></div>
          <div class="pack-label">${esc(item)}</div>
        </div>`;
      });
    });
    body.innerHTML = html;
    document.getElementById('packProg').textContent = `${done} / ${total} 준비 완료 (${Math.round(done/total*100)}%)`;
  }

  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function closeModalBg(e) {
  if (e.target.id === 'modalOverlay') closeModal();
}

function togglePack(item) {
  const checked = JSON.parse(localStorage.getItem('okinawa_pack') || '{}');
  if (checked[item]) delete checked[item];
  else checked[item] = true;
  localStorage.setItem('okinawa_pack', JSON.stringify(checked));
  openModal('pack');
}

function initScrollAnim() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)'} });
  },{threshold:.1});
  document.querySelectorAll('.day').forEach(d => {
    d.style.opacity='0';d.style.transform='translateY(30px)';d.style.transition='all .6s ease';obs.observe(d);
  });
  document.querySelectorAll('.tl-item').forEach((item,i) => {
    item.style.opacity='0';item.style.transform='translateX(-10px)';
    item.style.transition=`all .4s ease ${i*.03}s`;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateX(0)'}});
    },{threshold:.1});
    io.observe(item);
  });
}

loadData();
render();
renderDday();
